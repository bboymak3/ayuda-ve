<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Interactivo — Ayuda VE</title>
  <meta name="description" content="Mapa interactivo de necesidades y disponibles de ayuda en Venezuela. Haz clic para poner un evento.">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { overflow: hidden; }
    .map-page-header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .map-page-title { font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    .map-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .map-filter-btn {
      padding: 4px 10px;
      border-radius: 9999px;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .map-filter-btn.active { background: var(--color-primary); color: white; border-color: var(--color-primary); }

    /* Panel de ayuda flotante, esquina superior derecha, plegable */
    .map-help-panel {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(15,23,42,0.15);
      z-index: 1000;
      max-width: 220px;
      font-size: 0.8rem;
      overflow: hidden;
    }
    .map-help-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: var(--color-primary);
      color: white;
      font-weight: 600;
      font-size: 0.8rem;
    }
    .map-help-close {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 4px;
      border-radius: 4px;
    }
    .map-help-close:hover { background: rgba(255,255,255,0.2); }
    .map-help-body {
      padding: 8px 10px;
      color: var(--color-text);
      line-height: 1.4;
    }
    .map-help-actions {
      padding: 6px 10px 8px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .map-help-toggle {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(15,23,42,0.2);
      z-index: 1000;
      display: none;
    }
    .map-help-toggle.visible { display: block; }
  </style>
</head>
<body>

  <header class="header" style="padding: 0;">
    <div class="header-inner" style="padding: 0.5rem 1rem;">
      <a href="/" class="logo">
        <span class="logo-icon">🤝</span>
        <span>Ayuda VE</span>
      </a>
      <nav class="nav" id="nav">
        <a href="/" class="nav-link">Inicio</a>
        <a href="/mapa.html" class="nav-link active">Mapa</a>
        <a href="/buscar.html" class="nav-link">Buscar</a>
        <a href="/reportar.html" class="nav-link">Reportar</a>
        <a href="/reportar-abuso.html" class="nav-link" style="color:#dc2626">🚩 Abuso</a>
        <a href="/admin/" class="nav-link">Admin</a>
        <div class="lang-switcher"><button class="lang-btn active" data-lang="es" onclick="setLang('es')">ES</button><button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button></div>
      </nav>
      <button class="menu-toggle" onclick="document.getElementById('nav').classList.toggle('mobile-open')">☰</button>
    </div>
  </header>

  <div class="map-page-header">
    <div class="map-page-title">🗺️ Mapa Interactivo</div>
    <div class="map-filters">
      <button class="map-filter-btn active" data-filter="all">Todos</button>
      <button class="map-filter-btn" data-filter="solicitud" style="color:#dc2626">🆘 Solicitudes</button>
      <button class="map-filter-btn" data-filter="disponible" style="color:#10b981">💚 Disponibles</button>
      <button class="map-filter-btn" data-filter="informacion" style="color:#3b82f6">ℹ️ Info</button>
      <button class="map-filter-btn" data-filter="resuelto" style="color:#10b981">✅ Resueltos</button>
    </div>
  </div>

  <div class="map-container">
    <div id="map"></div>

    <!-- Panel de ayuda plegable (esquina superior derecha) -->
    <div id="map-help-panel" class="map-help-panel">
      <div class="map-help-header">
        <span>📌 Ayuda</span>
        <button class="map-help-close" onclick="closeHelp()" title="Cerrar">✕</button>
      </div>
      <div class="map-help-body">
        <strong>Clic en el mapa</strong> para poner un evento.<br>
        Completa: nombre, teléfono y requerimiento.<br>
        <small>Tu evento es visible al instante.</small>
      </div>
      <div class="map-help-actions">
        <button class="btn btn-sm btn-outline" onclick="loadEventos()" style="font-size:0.75rem;padding:3px 8px">🔄 Actualizar</button>
      </div>
    </div>

    <!-- Botón flotante para reabrir el panel -->
    <button id="map-help-toggle" class="map-help-toggle" onclick="openHelp()">📌 Ayuda</button>

    <div class="map-legend">
      <div style="font-weight:700;margin-bottom:4px">Leyenda</div>
      <div class="legend-item"><span class="legend-dot" style="background:#dc2626"></span> Crítico</div>
      <div class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span> Alta urgencia</div>
      <div class="legend-item"><span class="legend-dot" style="background:#3b82f6"></span> Información/Disponible</div>
      <div class="legend-item"><span class="legend-dot" style="background:#10b981"></span> Resuelto</div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- JS del mapa -->
  <script src="/js/i18n.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/mapa.js"></script>
</body>
</html>
