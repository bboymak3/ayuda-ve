<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Últimas Noticias — Ayuda VE</title>
  <meta name="description" content="Todas las publicaciones recientes: necesidades, disponibles e información útil. Actualizado en tiempo real.">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo"><span class="logo-icon">🤝</span><span>Ayuda VE</span></a>
      <nav class="nav" id="nav">
        <a href="/" class="nav-link">Inicio</a>
        <a href="/mapa.html" class="nav-link">Mapa</a>
        <a href="/noticias.html" class="nav-link">Noticias</a>
        <a href="/buscar.html" class="nav-link">Buscar</a>
        <a href="/reportar.html" class="nav-link">Reportar</a>
        <a href="/reportar-abuso.html" class="nav-link" style="color:#dc2626">🚩 Abuso</a>
        <a href="/admin/" class="nav-link">Admin</a>
        <div class="lang-switcher"><button class="lang-btn active" data-lang="es" onclick="setLang('es')">ES</button><button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button></div>
      </nav>
      <button class="menu-toggle" onclick="document.getElementById('nav').classList.toggle('mobile-open')">☰</button>
    </div>
  </header>

  <div class="container-feed">
    <h1 class="section-title" data-i18n="noticias.title">📰 Últimas Noticias</h1>
    <p class="section-subtitle" data-i18n="noticias.sub">Todas las publicaciones recientes: necesidades, disponibles e información útil. Actualizado en tiempo real.</p>

    <div class="flex gap-1 mb-2" style="flex-wrap:wrap">
      <button class="btn btn-sm btn-outline" data-tipo="" onclick="filtrar('')">📋 Todas</button>
      <button class="btn btn-sm btn-outline" data-tipo="solicitud" onclick="filtrar('solicitud')">🆘 Necesitan</button>
      <button class="btn btn-sm btn-outline" data-tipo="disponible" onclick="filtrar('disponible')">💚 Disponibles</button>
      <button class="btn btn-sm btn-outline" data-tipo="informacion" onclick="filtrar('informacion')">ℹ️ Info</button>
      <button class="btn btn-sm btn-primary" onclick="loadNoticias()">🔄 Actualizar</button>
    </div>

    <div id="noticias-list" class="loading-state">Cargando...</div>

    <div class="text-center mt-3">
      <button id="load-more" class="btn btn-outline" onclick="loadMore()" style="display:none">Cargar más →</button>
    </div>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/main.js"></script>
  <script>
    let currentOffset = 0;
    let currentTipo = '';
    const PAGE_SIZE = 20;

    async function loadNoticias(append = false) {
      const list = document.getElementById('noticias-list');
      if (!append) {
        list.innerHTML = '<div class="loading-state"><div class="spinner spinner-dark"></div> Cargando...</div>';
        currentOffset = 0;
      }

      try {
        let url = `/api/noticias?limit=${PAGE_SIZE}&offset=${currentOffset}`;
        if (currentTipo) url += `&tipo=${currentTipo}`;

        const data = await api(url);

        if (!append) {
          if (data.publicaciones.length === 0) {
            list.innerHTML = `
              <div class="card text-center">
                <h3>Aún no hay publicaciones</h3>
                <p class="text-muted mb-2">Sé el primero en publicar.</p>
                <a href="/reportar.html" class="btn btn-primary">➕ Publicar</a>
              </div>
            `;
            document.getElementById('load-more').style.display = 'none';
            return;
          }
          list.innerHTML = data.publicaciones.map(renderNoticia).join('');
        } else {
          list.innerHTML += data.publicaciones.map(renderNoticia).join('');
        }

        // Mostrar botón "cargar más" si hay más resultados
        document.getElementById('load-more').style.display =
          data.publicaciones.length === PAGE_SIZE ? '' : 'none';

      } catch (e) {
        list.innerHTML = `<div class="alert alert-error">${escapeHtml(e.message)}</div>`;
      }
    }

    function renderNoticia(p) {
      const tipoLabel = {
        'solicitud': '🆘 NECESITA AYUDA',
        'disponible': '💚 DISPONIBLE PARA DONAR',
        'informacion': 'ℹ️ INFORMACIÓN',
      }[p.tipo] || p.tipo;

      const fuenteLabel = p.fuente === 'evento' ? '📍 Evento del mapa' : '📝 Reporte';
      const ubicacion = p.ubicacion_texto ||
        [p.ubicacion_ciudad, p.ubicacion_estado].filter(Boolean).join(', ') || '';

      const fotos = p.foto_urls && Array.isArray(p.foto_urls) ? p.foto_urls : null;
      const sectorInfo = p.sector_icono && p.sector_nombre
        ? `${p.sector_icono} ${escapeHtml(p.sector_nombre)}`
        : (p.categoria ? `🏷️ ${escapeHtml(p.categoria)}` : '');

      // Embed HTML (Facebook iframe)
      const embedHtml = p.embed_html || null;
      // URL de fuente original
      const fuenteUrl = p.video_url || p.fuente_url || null;
      // Detectar plataforma
      let plataformaIcon = '🔗';
      if (fuenteUrl) {
        const u = fuenteUrl.toLowerCase();
        if (u.includes('facebook')) plataformaIcon = '📘';
        else if (u.includes('instagram')) plataformaIcon = '📷';
        else if (u.includes('whatsapp')) plataformaIcon = '💬';
        else if (u.includes('youtube')) plataformaIcon = '▶️';
        else if (u.includes('twitter') || u.includes('x.com')) plataformaIcon = '🐦';
      }

      // Título como link si hay fuente
      const tituloHTML = fuenteUrl
        ? `<h3 class="card-title"><a href="${escapeHtml(fuenteUrl)}" target="_blank" rel="noopener">${escapeHtml(p.titulo || 'Sin título')}</a></h3>`
        : `<h3 class="card-title">${escapeHtml(p.titulo || 'Sin título')}</h3>`;

      // Descripción: dividir en parte principal (antes del embed) y secundaria (después)
      const descCompleta = p.descripcion || '';
      // Si hay embed, dividir la descripción: primera mitad antes, segunda mitad después
      let descPrincipal = descCompleta;
      let descSecundaria = '';
      if (embedHtml && descCompleta.length > 100) {
        const puntoMedio = descCompleta.slice(0, Math.floor(descCompleta.length / 2)).lastIndexOf('. ');
        if (puntoMedio > 50) {
          descPrincipal = descCompleta.slice(0, puntoMedio + 1);
          descSecundaria = descCompleta.slice(puntoMedio + 2);
        } else {
          // Si no hay buen punto de corte, mostrar todo antes del embed
          descPrincipal = descCompleta.slice(0, 200) + (descCompleta.length > 200 ? '...' : '');
          descSecundaria = descCompleta.length > 200 ? descCompleta.slice(200) : '';
        }
      } else if (descCompleta.length > 500) {
        descPrincipal = descCompleta.slice(0, 500) + '...';
      }

      return `
        <div class="card">
          <!-- HEADER: etiquetas + tiempo -->
          <div class="card-meta" style="justify-content:space-between;margin-bottom:8px">
            <div class="flex" style="gap:6px;flex-wrap:wrap;align-items:center">
              <span class="card-meta-item"><strong>${tipoLabel}</strong></span>
              <span class="urgencia-pill urgencia-${p.urgencia}">${p.urgencia.toUpperCase()}</span>
              ${sectorInfo ? `<span class="card-meta-item">${sectorInfo}</span>` : ''}
            </div>
            <div class="flex" style="gap:8px;align-items:center">
              <span class="card-meta-item">${fuenteLabel}</span>
              <span class="card-meta-item">🕒 ${timeAgo(p.created_at)}</span>
            </div>
          </div>

          <!-- TÍTULO (centrado, azul, prominente) -->
          <h3 class="card-title" style="text-align:center;font-size:1.15rem;margin:10px 0;color:var(--color-primary)">
            ${fuenteUrl
              ? `<a href="${escapeHtml(fuenteUrl)}" target="_blank" rel="noopener" style="color:var(--color-primary)">${escapeHtml(p.titulo || 'Sin título')}</a>`
              : escapeHtml(p.titulo || 'Sin título')}
          </h3>

          <!-- DESCRIPCIÓN PRINCIPAL (antes del embed) -->
          ${descPrincipal ? `<p class="card-description" style="text-align:justify;margin-bottom:10px;font-size:0.95rem;line-height:1.6">${escapeHtml(descPrincipal)}</p>` : ''}

          <!-- EMBED DE FACEBOOK -->
          ${embedHtml ? `
            <div class="embed-wrap" style="margin:10px 0;padding-bottom:120%;min-height:300px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden">
              ${embedHtml}
            </div>
          ` : ''}

          <!-- FOTO (si no hay embed pero hay foto) -->
          ${!embedHtml && fotos && fotos.length > 0 ? `
            <div style="margin:8px 0">
              <img src="${escapeHtml(fotos[0])}" style="width:100%;max-height:350px;object-fit:cover;border-radius:8px;border:1px solid #e2e8f0" loading="lazy">
            </div>
          ` : ''}

          <!-- DESCRIPCIÓN SECUNDARIA (después del embed) -->
          ${descSecundaria ? `<p class="card-description" style="text-align:justify;margin-top:10px;font-size:0.9rem;line-height:1.5;color:#475569">${escapeHtml(descSecundaria)}</p>` : ''}

          <!-- ENLACE DE FUENTE -->
          ${fuenteUrl ? `
            <div style="margin:8px 0;word-break:break-all">
              <a href="${escapeHtml(fuenteUrl)}" target="_blank" rel="noopener" style="color:var(--color-primary);font-size:0.8rem;text-decoration:underline">${escapeHtml(fuenteUrl.slice(0, 80))}${fuenteUrl.length > 80 ? '...' : ''}</a>
            </div>
          ` : ''}

          <!-- BOTONES -->
          <div class="card-actions" style="flex-wrap:wrap;margin-top:8px;justify-content:center">
            <a href="${p.url}" class="btn btn-sm btn-primary">Ver ficha completa →</a>
            ${fuenteUrl ? `<a href="${escapeHtml(fuenteUrl)}" target="_blank" rel="noopener" class="btn btn-sm btn-outline">${plataformaIcon} Ver en fuente original →</a>` : ''}
          </div>
        </div>
      `;
    }

    function filtrar(tipo) {
      currentTipo = tipo;
      document.querySelectorAll('[data-tipo]').forEach(b => {
        b.classList.toggle('btn-primary', b.dataset.tipo === tipo);
        b.classList.toggle('btn-outline', b.dataset.tipo !== tipo);
      });
      loadNoticias();
    }

    function loadMore() {
      currentOffset += PAGE_SIZE;
      loadNoticias(true);
    }

    loadNoticias();
  </script>
</body>
</html>
